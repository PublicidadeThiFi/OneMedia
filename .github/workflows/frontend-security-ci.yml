name: Frontend Security CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-ci:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://api.example.com
      VITE_APP_URL: https://app.example.com
      URL_ONE_MEDIA: https://www.example.com
      VITE_MERCADO_PAGO_PUBLIC_KEY: TEST-PLACEHOLDER
      VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scan repository for committed secrets
        run: npm run security:scan

      - name: Validate public build environment
        run: npm run validate:public-env

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm run security:audit
